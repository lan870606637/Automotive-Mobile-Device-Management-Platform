{% extends "base.html" %}

{% block title %}用户登录 - 设备管理系统{% endblock %}

{% set show_nav = false %}

{% block content %}
<div class="auth-page">
    <div class="auth-logo">
        <div class="logo-icon">📱</div>
        <h1>Carbit测试设备管理系统</h1>
        <p>手机端登录</p>
    </div>
    
    <div class="login-container">
        <!-- 左侧：二维码区域 -->
        <div class="qr-section">
            <h3>📷 微信扫码登录</h3>
            <div class="qr-code-box">
                <img src="{{ url_for('login_qrcode') }}" alt="登录二维码" class="qr-image" id="qrImage">
                <p class="qr-tip">请使用微信扫码访问系统</p>
                <p class="qr-refresh" onclick="refreshQRCode()">🔄 刷新二维码</p>
            </div>
        </div>
        
        <!-- 右侧：登录表单 -->
        <div class="auth-content login-form-section">
            <h3>🔐 账号密码登录</h3>
            <form method="POST" action="{{ url_for('mobile_login') }}">
                <div class="form-group">
                    <label for="phone">手机号</label>
                    <input type="tel" id="phone" name="phone" class="form-control" placeholder="请输入手机号" required pattern="[0-9]{11}">
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="请输入密码" required>
                </div>
                
                {% if error %}
                <div class="alert alert-error">{{ error }}</div>
                {% endif %}
                
                <button type="submit" class="btn btn-primary btn-large" style="width: 100%; margin-top: 20px;">
                    登录
                </button>
            </form>
            
            <p class="auth-tips" style="margin-top: 20px;">
                测试账号: 13800138001 / 123456
            </p>
            
            <div style="text-align: center; margin-top: 20px;">
                <a href="{{ url_for('register') }}" class="btn btn-default" style="display: inline-block; padding: 10px 30px; text-decoration: none;">
                    注册新账号
                </a>
            </div>
        </div>
    </div>
    
    <div class="auth-footer">
        <div style="margin-bottom: 15px;">
            <a href="{{ url_for('select_device_type') }}" class="switch-device-link">
                🔄 切换设备类型
            </a>
        </div>
        <p>技术支持 © 2024</p>
    </div>
</div>

<script>
function refreshQRCode() {
    var img = document.getElementById('qrImage');
    img.src = "{{ url_for('login_qrcode') }}?t=" + new Date().getTime();
}

// 每5分钟自动刷新二维码
setInterval(refreshQRCode, 300000);
</script>

<style>
.switch-device-link {
    color: #666;
    text-decoration: none;
    font-size: 14px;
    padding: 8px 16px;
    border-radius: 20px;
    background: #f5f5f5;
    transition: all 0.3s;
}

.switch-device-link:hover {
    background: #e0e0e0;
    color: #333;
}
</style>
{% endblock %}
