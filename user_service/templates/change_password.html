<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if is_first_login %}首次登录 - 修改密码{% else %}修改密码{% endif %} - 设备管理系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='pc/pc_style.css') }}">
    <style>
        .password-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .password-header {
            text-align: center;
            padding: 40px 20px 20px;
            color: white;
        }
        
        .password-header .logo-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }
        
        .password-header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .password-header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .password-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        
        .password-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .password-box h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
            font-size: 24px;
        }
        
        .password-tips {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
            padding: 12px;
            background: #f0f7ff;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .password-tips.warning {
            background: #fff7e6;
            border-left-color: #faad14;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .alert-error {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .password-footer {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
        }
        
        @media (max-width: 480px) {
            .password-box {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="password-page">
        <div class="password-header">
            <div class="logo-icon">🔐</div>
            <h1>Carbit测试设备管理系统</h1>
            <p>{% if is_first_login %}首次登录{% else %}修改密码{% endif %}</p>
        </div>
        
        <div class="password-container">
            <div class="password-box">
                <h2>{% if is_first_login %}🔔 首次登录修改密码{% else %}修改密码{% endif %}</h2>
                
                {% if is_first_login %}
                <div class="password-tips warning">
                    <strong>⚠️ 首次登录提示</strong><br>
                    为了您的账号安全，首次登录需要修改初始密码。请设置一个新密码（至少6位）。
                </div>
                {% else %}
                <div class="password-tips">
                    请设置您的新密码（至少6位）
                </div>
                {% endif %}
                
                <form method="POST" action="{{ url_for('change_password') }}">
                    <div class="form-group">
                        <label for="new_password">新密码</label>
                        <input type="password" id="new_password" name="new_password" placeholder="请输入新密码（至少6位）" required minlength="6">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm_password">确认新密码</label>
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="请再次输入新密码" required minlength="6">
                    </div>
                    
                    {% if error %}
                    <div class="alert-error">{{ error }}</div>
                    {% endif %}
                    
                    <button type="submit" class="btn-submit">确认修改</button>
                </form>
            </div>
        </div>
        
        <div class="password-footer">
            <p>技术支持 © 2024</p>
        </div>
    </div>
</body>
</html>
