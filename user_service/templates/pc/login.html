<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - Carbit藏宝阁（电脑端）</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='pc/pc_style.css') }}">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .login-header {
            text-align: center;
            padding: 40px 20px 20px;
            color: white;
        }
        
        .login-header .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
        }
        
        .login-header .logo-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }
        
        .login-header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .login-header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .login-container-pc {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .alert-error {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .login-tips {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 13px;
        }
        
        .login-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        
        .btn-register {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        
        .btn-register:hover {
            text-decoration: underline;
        }
        
        .switch-device {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 20px;
            background: #f5f5f5;
            transition: all 0.3s;
        }
        
        .switch-device:hover {
            background: #e8e8e8;
        }
        
        .login-footer {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
        }
        
        @media (max-width: 480px) {
            .login-box {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-header">
            <div class="logo-icon">
                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- 顶层攒尖顶 -->
                    <path d="M16 6L20 2L24 6" stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
                    <circle cx="20" cy="4" r="1.5" fill="#fff"/>
                    <!-- 顶层屋檐 -->
                    <path d="M8 12L20 6L32 12" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M6 12H34" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
                    <!-- 顶层阁身 -->
                    <rect x="14" y="12" width="12" height="6" stroke="#fff" stroke-width="1.5" fill="none"/>
                    <path d="M16 14H24" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
                    <!-- 中层屋檐 -->
                    <path d="M6 20L20 14L34 20" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M4 20H36" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
                    <!-- 中层阁身 -->
                    <rect x="12" y="20" width="16" height="7" stroke="#fff" stroke-width="1.5" fill="none"/>
                    <path d="M14 22H26" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
                    <path d="M14 24H26" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
                    <!-- 底层屋檐 -->
                    <path d="M4 29L20 22L36 29" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 29H38" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
                    <!-- 底层阁身 -->
                    <rect x="10" y="29" width="20" height="8" rx="1" stroke="#fff" stroke-width="2" fill="none"/>
                    <!-- 拱门 -->
                    <path d="M16 37V32C16 30 17 29 20 29C23 29 24 30 24 32V37" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <!-- 飞檐装饰 -->
                    <path d="M8 12L6 10" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
                    <path d="M32 12L34 10" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
                    <path d="M6 20L4 18" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
                    <path d="M34 20L36 18" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
                </svg>
            </div>
            <h1>Carbit藏宝阁</h1>
            <p>电脑端登录</p>
        </div>
        
        <div class="login-container-pc">
            <div class="login-box">
                <h2>🔐 账号密码登录</h2>
                
                <form method="POST" action="{{ url_for('pc_login') }}">
                    <div class="form-group">
                        <label for="email">邮箱</label>
                        <input type="email" id="email" name="email" placeholder="请输入邮箱" value="{{ prefilled_email or '' }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" placeholder="请输入密码" required>
                    </div>
                    
                    {% if error %}
                    <div class="alert-error">{{ error }}</div>
                    {% endif %}
                    
                    <button type="submit" class="btn-login">登 录</button>
                </form>
                
                <p class="login-tips">
                    初始密码: 123456（首次登录需修改密码）<br>
                    忘记密码请联系管理员
                </p>
            </div>
        </div>
        
        <div class="login-footer">
            <p>技术支持 © 2024</p>
        </div>
    </div>
</body>
</html>
