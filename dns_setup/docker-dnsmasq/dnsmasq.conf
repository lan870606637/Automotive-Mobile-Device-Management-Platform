# dnsmasq 配置文件
# 将此文件中的 192.168.1.100 替换为你的实际服务器 IP

# 基本配置
port=53
listen-address=0.0.0.0
bind-interfaces
no-resolv

# 上游 DNS 服务器（用于解析外网域名）
server=8.8.8.8
server=114.114.114.114
server=223.5.5.5

# 本地域名解析
domain=carbit.com.cn

# 自定义 DNS 记录
# 设备管理系统
address=/device.carbit.com.cn/192.168.1.100
address=/admin.device.carbit.com.cn/192.168.1.100

# 日志配置
log-queries
log-facility=/var/log/dnsmasq.log

# 缓存配置
cache-size=1000
