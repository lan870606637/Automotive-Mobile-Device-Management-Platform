# docker-compose.full.yml - 完整版（包含 Nginx）
version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: device-mysql
    environment:
      MYSQL_ROOT_PASSWORD: carbit2014
      MYSQL_DATABASE: device_management
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./device_management_20260303_171833.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis 缓存
  redis:
    image: redis:alpine
    container_name: device-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # 主应用服务
  web:
    build: .
    container_name: device-web
    expose:
      - "5000"
      - "5001"
      - "5002"
    env_file:
      - .env.docker
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./backups:/app/backups
      - ./data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: device-nginx
    ports:
      - "80:80"
      - "81:81"
      - "82:82"
    volumes:
      - ./nginx.docker.conf:/etc/nginx/nginx.conf:ro
      - ./user_service/static:/app/user_service/static:ro
      - ./admin_service/static:/app/admin_service/static:ro
      - ./uploads:/app/uploads:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
